<!DOCTYPE html>
<html>
<head>
    <title>Music App</title>
 <style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #121212;
    color: #eee;
}

/* MENU */
.menu {
    background: #1f1f1f;
    padding: 12px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid #333;
}

.menu button {
    background: #2a2a2a;
    color: white;
    border: none;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.2s;
}

.menu button:hover {
    background: #444;
}

/* SEARCH */
.search-container {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}

#search {
    width: 100%;
    max-width: 500px;
    height: 45px;
    font-size: 16px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #2a2a2a;
    color: white;
}

/* 🔥 LAYOUT PRINCIPAL (FALTAVA ISSO) */
.container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

/* BOX */
.box {
    flex: 1; /* 🔥 resolve o problema de quebra */
    min-width: 0;
    background: #1c1c1c;
    padding: 15px;
    border-radius: 10px;
    height: 80vh;
    overflow-y: auto;
}

/* TITULO */
h2 {
    margin-top: 0;
}

/* LISTA */
li {
    padding: 10px;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 5px;
    transition: 0.2s;
}

li:hover {
    background: #2a2a2a;
}

/* ALBUM CARD */
.album-item {
    display: flex;
    align-items: center;
    gap: 10px;
}

.album-item img {
    width: 100px;  /* 🔥 antes tava gigante */
    height: 100px;
    border-radius: 6px;
    object-fit: cover;
}

/* MODAL */
.modal {
    display: none; /* 🔥 CORRETO */
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);

    align-items: center;
    justify-content: center;
}

/* CONTEÚDO */
.modal-content {
    background: #1e1e1e;
    padding: 20px;
    width: 400px;
    max-height: 80vh;
    overflow-y: auto;
    border-radius: 10px;
}

/* INPUT */
input {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
    border: none;
    border-radius: 5px;
    background: #2a2a2a;
    color: white;
}

/* BOTÕES MODAL */
.modal-content button {
    width: 100%;
    margin-top: 5px;
    padding: 10px;
    border: none;
    background: #3a3a3a;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.modal-content button:hover {
    background: #555;
}

/* LISTA BUSCA */
#listaBusca li,
#listaBuscaAlbum li {
    background: #2a2a2a;
}

/* SCROLL */
::-webkit-scrollbar {
    width: 6px;
}

::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
}
</style>
</head>
<body>

<!-- MENU -->
<div class="menu">
    <button onclick="abrirModal('artista')">Add Artista</button>
    <button onclick="abrirModal('album')">Add Álbum</button>
    <button onclick="abrirModal('musica')">Add Música</button>
    <button onclick="exportar()">Exportar JSON</button>
    <button onclick="abrirModal('scraper')">Importar Album</button>
</div>
<div class="search-container">
    <input 
        id="search"
        placeholder="Buscar artista ou álbum..."
        oninput="filtrar()"
    >
</div>

<div class="container">
    <div class="box">
        <h2>Artistas</h2>
        <ul id="listaArtistas"></ul>
    </div>

    <div class="box">
        <h2>Álbuns</h2>
        <ul id="listaAlbuns"></ul>
    </div>

    <div class="box">
        <h2>Músicas</h2>
        <ul id="listaMusicas"></ul>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>

        <div id="modalBody"></div>

        <button onclick="salvarModal()">Salvar</button>
        <button onclick="fecharModal()">Fechar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
