<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>musicdb-manager V 1.0 - by Leonel Miguins</title>
    <link rel="stylesheet" href="style.css">
    <icon rel="icon" href="img/icon.ico" type="image/x-icon">
</head>

<body>

    <div class="top-buttons">
        <div class="top-logo">
            <img src="img/icon.png" alt="Icon" class="app-icon" width="32" height="32">
            <a>musicdb-manager</h4>
        </div>
        <br>
        <button id="btn-open-artista">Adicionar Artista</button>
        <button id="btn-open-album">Adicionar Álbum</button>
        <button id="btn-open-musica">Adicionar Música</button>
        <button id="btn-open-scraper" onclick="window.location.href='scraper.html'">Abrir Scraper</button>
        <button id="btn-open-info">Informações Detalhadas</button>
        <button id="btn-export-db">Exportar Banco (.json)</button>
        <button id="btn-export-db-letters">Exportar Banco (Letras) (.json)</button>
    </div>

    <div class="container-horizontal">
        <!-- Artistas -->
        <div class="section" id="section-artistas">
            <h2>Artistas</h2>
            <div id="artistas-list" class="cards-container"></div>
        </div>

        <!-- Álbuns -->
        <div class="section" id="section-albuns">
            <h2 id="section-albuns-info">Álbuns</h2>
            <div id="albuns-list" class="cards-container"></div>
        </div>

        <!-- Músicas -->
        <div class="section" id="section-musicas">
            <h2>Músicas</h2>
            <ul id="musicas-list"></ul>
        </div>
    </div>

    <!-- Player oculto -->
    <audio id="player" hidden></audio>

    <!-- Modal Adicionar Artista -->
    <div class="modal" id="modal-artista">
        <div class="modal-content">
            <h3>Adicionar Artista</h3>
            <label>Nome:</label>
            <input type="text" id="input-artista-nome">
            <label>Gênero:</label>
            <input type="text" id="input-artista-genero">
            <label>Capa (URL):</label>
            <input type="text" id="input-artista-capa">
            <div class="modal-buttons">
                <button id="btn-add-artista">Adicionar</button>
                <button class="btn-close">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal Adicionar Álbum -->
    <div class="modal" id="modal-album">
        <div class="modal-content">
            <h3>Adicionar Álbum</h3>
            <label>Nome do Álbum:</label>
            <input type="text" id="input-album-nome">
            <label>Capa (URL):</label>
            <input type="text" id="input-album-capa">
            <label>Artista:</label>
            <select id="select-album-artista"></select>
            <label>Servidor:</label>
            <input type="text" id="input-album-servidor">
            <div class="modal-buttons">
                <button id="btn-add-album">Adicionar</button>
                <button class="btn-close">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal Adicionar Música -->
    <div class="modal" id="modal-musica">
        <div class="modal-content">
            <h3>Adicionar Música</h3>
            <label>Nome da Música:</label>
            <input type="text" id="input-musica-nome">
            <label>URL:</label>
            <input type="text" id="input-musica-url">
            <label>Álbum:</label>
            <select id="select-musica-album"></select>
            <div class="modal-buttons">
                <button id="btn-add-musica">Adicionar</button>
                <button class="btn-close">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal Informações Detalhadas -->
    <div class="modal" id="modal-info">
        <div class="modal-content">
            <h3>Informações Detalhadas</h3>
            <p id="info-artistas"></p>
            <p id="info-albuns"></p>
            <p id="info-musicas"></p>
            <div class="modal-buttons">
                <button class="btn-close">Fechar</button>
            </div>
        </div>
    </div>


    <script src="script.js"></script>

</body>

</html>
